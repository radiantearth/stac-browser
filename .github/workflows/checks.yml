name: Code Checks
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - name: I18N messages for stac-fields are complete
        run: npm run i18n:fields
      - uses: infotroph/tree-is-clean@v1
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - name: Hooks in documentation are complete
        run: npm run docs:hooks
      - uses: infotroph/tree-is-clean@v1
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - name: Lint Source Code
        run: npm run lint:check
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - name: Format Source Code
        run: npm run format:check
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm ci
      - name: Lint Documentation
        run: npm run docs:lint

